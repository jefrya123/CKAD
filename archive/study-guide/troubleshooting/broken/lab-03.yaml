# LAB 03 — Mirrors Q5 (ServiceAccount + Secret): Secret has wrong type
# Symptom: Secret exists but token field is empty / not a real SA token
# Your job: Fix the secret so it auto-populates the token for the ServiceAccount
#
# SETUP:
#   kubectl create namespace neptune 2>/dev/null || true
#   kubectl apply -f lab-03.yaml
#
# Then check: kubectl get secret q05-token -n neptune -o jsonpath='{.data.token}' | base64 -d
# It should be a valid JWT (starts with eyJ...)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: q05-sa
  namespace: neptune
---
apiVersion: v1
kind: Secret
metadata:
  name: q05-token
  namespace: neptune
  annotations:
    kubernetes.io/service-account.name: q05-sa
type: Opaque               # BUG: should be kubernetes.io/service-account-token
stringData:
  note: "this is not a token"
