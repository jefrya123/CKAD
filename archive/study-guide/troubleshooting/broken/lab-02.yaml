# LAB 02 — Mirrors Q3 (Job): Wrong parallelism structure + missing pod label
# Symptom: Job applies but completes wrong number of pods, label missing
# Your job: Fix so job runs 3 completions with parallelism 2, pods labelled id=q03-job
#
# SETUP: kubectl apply -f lab-02.yaml -n neptune
# kubectl get job q03-job -n neptune
# kubectl get pods -n neptune -l id=q03-job   <- should return 3 pods
---
apiVersion: batch/v1
kind: Job
metadata:
  name: q03-job
  namespace: neptune
spec:
  completions: 3
  parallelism: 5            # BUG 1: parallelism > completions — wasteful and wrong per spec
  template:
    metadata:
      labels:
        app: q03-job        # BUG 2: label key should be "id", not "app"
    spec:
      restartPolicy: Never
      containers:
      - name: job
        image: busybox
        command: ["/bin/sh", "-c", "sleep 2 && echo done"]
