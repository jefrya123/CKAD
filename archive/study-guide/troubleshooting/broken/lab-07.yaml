# LAB 07 — Mirrors Q9 (Pod→Deployment): Deployment missing selector + wrong replicas
# Symptom: kubectl apply errors OR pods created but Deployment shows 0/1 READY
# Your job: Fix the Deployment so it manages its pods and runs 3 replicas
#
# SETUP:
#   kubectl create namespace neptune 2>/dev/null || true
#   kubectl apply -f lab-07.yaml
#   kubectl get deploy q09-deploy -n neptune
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: q09-deploy
  namespace: neptune
spec:
  replicas: 1                  # BUG 1: should be 3
  selector:
    matchLabels:
      app: q09-app
  template:
    metadata:
      labels:
        app: q09-wrong-label   # BUG 2: "q09-wrong-label" != "q09-app" in selector
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - containerPort: 80
