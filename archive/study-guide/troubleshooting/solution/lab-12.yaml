# LAB 12 SOLUTION
# BUG 1: initContainer missing volumeMount for /work
# BUG 2: service selector app: q17-wrong -> q17
# BUG 3: NetworkPolicy namespaceSelector name: venus -> moon
---
apiVersion: v1
kind: Pod
metadata:
  name: q17-pod
  namespace: moon
  labels:
    app: q17
spec:
  initContainers:
  - name: init
    image: busybox
    command: ["sh", "-c", "echo ready > /work/status.txt"]
    volumeMounts:           # fixed BUG 1
    - name: work
      mountPath: /work
  containers:
  - name: main
    image: nginx
    volumeMounts:
    - name: work
      mountPath: /work
  volumes:
  - name: work
    emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: q18-svc
  namespace: moon
spec:
  selector:
    app: q17              # fixed BUG 2
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: q20-netpol
  namespace: moon
spec:
  podSelector:
    matchLabels:
      app: q17
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: moon      # fixed BUG 3
