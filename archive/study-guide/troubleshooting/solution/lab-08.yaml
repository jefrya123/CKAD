# LAB 08 SOLUTION
# BUG 1: selector app: q10-backend -> q10-app
# BUG 2: targetPort: 8080 -> 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: q10-deploy
  namespace: pluto
spec:
  replicas: 2
  selector:
    matchLabels:
      app: q10-app
  template:
    metadata:
      labels:
        app: q10-app
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: q10-svc
  namespace: pluto
spec:
  selector:
    app: q10-app
  ports:
  - port: 3000
    targetPort: 80
