# LAB 11 SOLUTION
# BUG: log-reader volumeMount name "log-data" -> "logs" (must match the defined volume)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: q16-deploy
  namespace: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: q16
  template:
    metadata:
      labels:
        app: q16
    spec:
      containers:
      - name: app
        image: busybox
        command: ["sh", "-c", "while true; do echo \"$(date): log entry\" >> /var/log/app/app.log; sleep 3; done"]
        volumeMounts:
        - name: logs
          mountPath: /var/log/app
      - name: log-reader
        image: busybox
        command: ["sh", "-c", "tail -f /var/log/app/app.log"]
        volumeMounts:
        - name: logs            # fixed
          mountPath: /var/log/app
      volumes:
      - name: logs
        emptyDir: {}
