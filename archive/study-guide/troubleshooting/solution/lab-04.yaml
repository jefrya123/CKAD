# LAB 04 SOLUTION
# BUG 1: path: /healthz -> /
# BUG 2: port: 8080 -> 80
---
apiVersion: v1
kind: Pod
metadata:
  name: q06-pod
  namespace: neptune
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 5
