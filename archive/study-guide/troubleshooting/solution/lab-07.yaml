# LAB 07 SOLUTION
# BUG 1: replicas: 1 -> 3
# BUG 2: template label "q09-wrong-label" -> "q09-app" to match selector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: q09-deploy
  namespace: neptune
spec:
  replicas: 3
  selector:
    matchLabels:
      app: q09-app
  template:
    metadata:
      labels:
        app: q09-app
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - containerPort: 80
