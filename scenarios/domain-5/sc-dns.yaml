id: sc-dns
domain: 5
title: "Debug DNS Resolution in Kubernetes"
difficulty: medium
time_limit: 180
namespace: dns-ns
description: >
  In the "dns-ns" namespace, create a Deployment named "dns-test" with image "nginx:1.25"
  and expose it as a ClusterIP Service named "dns-svc" on port 80. Then verify DNS
  resolution works using nslookup from a temporary busybox pod in the same namespace.
  The service should resolve using the short name "dns-svc", the partial FQDN
  "dns-svc.dns-ns", and the full FQDN "dns-svc.dns-ns.svc.cluster.local".

hint: >
  Short names work within the same namespace. Cross-namespace resolution requires
  <service>.<namespace> or the full FQDN. Use kubectl run with --rm for temporary debug pods.

setup:
  commands:
    - "kubectl create namespace dns-ns --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create deployment dns-test --image=nginx:1.25 -n dns-ns"
    - "kubectl expose deployment dns-test --name=dns-svc --port=80 -n dns-ns"

validations:
  - name: service_exists
    type: resource_exists
    resource: service/dns-svc
    namespace: dns-ns

  - name: deployment_exists
    type: resource_exists
    resource: deployment/dns-test
    namespace: dns-ns

  - name: dns_resolves_short
    type: command_output
    command: "kubectl run dns-check --image=busybox:1.36 -n dns-ns --rm --restart=Never -q --timeout=30s -- nslookup dns-svc 2>/dev/null | head -5"
    mode: contains
    expected: "dns-svc"

  - name: service_port
    type: resource_field
    resource: service/dns-svc
    namespace: dns-ns
    jsonpath: "{.spec.ports[0].port}"
    expected: "80"

solution:
  steps:
    - "kubectl create namespace dns-ns --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create deployment dns-test --image=nginx:1.25 -n dns-ns"
    - "kubectl expose deployment dns-test --name=dns-svc --port=80 -n dns-ns"
    - "kubectl run tmp --image=busybox:1.36 -n dns-ns --rm -it --restart=Never -- nslookup dns-svc"
    - "kubectl run tmp2 --image=busybox:1.36 -n dns-ns --rm -it --restart=Never -- nslookup dns-svc.dns-ns.svc.cluster.local"
