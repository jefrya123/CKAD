id: sc-multi-container-pod
domain: 1
title: "Create a Multi-Container Pod"
difficulty: medium
time_limit: 180
namespace: web-team
description: >
  Create a Pod named "web-sidecar" in the "web-team" namespace with two containers:
  a main container named "web" running the "nginx:1.25" image, and a sidecar container
  named "logger" running "busybox:1.36" that sleeps indefinitely (sleep 3600).
  Both containers must be running.

hint: >
  Use kubectl run or a Pod manifest. For multiple containers, a manifest (kubectl apply -f)
  is the most reliable approach. Include a command for the busybox container to keep it running.

validations:
  - name: pod_exists
    type: resource_exists
    resource: pod/web-sidecar
    namespace: web-team

  - name: two_containers
    type: container_count
    pod: web-sidecar
    namespace: web-team
    expected: 2

  - name: nginx_image
    type: container_image
    pod: web-sidecar
    container: web
    namespace: web-team
    expected: "nginx:1.25"

solution:
  steps:
    - "kubectl create namespace web-team --dry-run=client -o yaml | kubectl apply -f -"
    - |
      kubectl apply -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: web-sidecar
        namespace: web-team
      spec:
        containers:
          - name: web
            image: nginx:1.25
          - name: logger
            image: busybox:1.36
            command: ["sleep", "3600"]
      EOF
