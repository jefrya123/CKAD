id: learn-rolling-updates
domain: 2
title: "Rolling Updates"
difficulty: medium
time_limit: 240
namespace: learn-rollout
learn_intro: >
  A rolling update replaces pods gradually with no downtime: Kubernetes creates
  a new ReplicaSet with the updated pod spec, scales it up slowly, and scales
  the old ReplicaSet down. Two parameters control the pace under
  spec.strategy.rollingUpdate: maxSurge (extra pods above desired count during
  update) and maxUnavailable (pods that can be down during update). Defaults
  are 25% each. Watch with: kubectl rollout status deployment/name. The
  alternative Recreate strategy kills all old pods first, causing downtime —
  only use it when you cannot run two versions simultaneously.
description: >
  Create a Deployment named "app" in the learn-rollout namespace using
  nginx:1.24 with 3 replicas and a RollingUpdate strategy with maxSurge 1 and
  maxUnavailable 0 (zero-downtime guarantee). Then update the image to
  nginx:1.25 and watch the rollout. Verify the new image is running.
hint: >
  Create the deployment from a YAML file with spec.strategy.type: RollingUpdate
  and spec.strategy.rollingUpdate.maxSurge: 1, maxUnavailable: 0.
  Update the image with: kubectl set image deployment/app nginx=nginx:1.25
  -n learn-rollout, then watch with kubectl rollout status deployment/app
  -n learn-rollout.
validations:
  - name: deployment_exists
    type: resource_exists
    resource: deployment/app
    namespace: learn-rollout
  - name: image_updated
    type: container_image
    pod_selector: app=app
    container: nginx
    namespace: learn-rollout
    expected: "nginx:1.25"
solution:
  steps:
    - "kubectl create ns learn-rollout --dry-run=client -o yaml | kubectl apply -f -"
    - |
      kubectl apply -f - <<EOF
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
        namespace: learn-rollout
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: app
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
        template:
          metadata:
            labels:
              app: app
          spec:
            containers:
            - name: nginx
              image: nginx:1.24
      EOF
    - "kubectl set image deployment/app nginx=nginx:1.25 -n learn-rollout"
    - "kubectl rollout status deployment/app -n learn-rollout"
    - "kubectl get deployment app -n learn-rollout -o jsonpath='{.spec.template.spec.containers[0].image}'"
