id: sc-rolling-update
domain: 2
title: "Perform a Rolling Update on a Deployment"
difficulty: medium
time_limit: 180
namespace: deploy-lab
description: >
  In the "deploy-lab" namespace, create a Deployment named "webapp" with 4 replicas
  using the image "nginx:1.19". Configure a RollingUpdate strategy with maxSurge=1
  and maxUnavailable=1. Then update the image to "nginx:1.21" and verify the rollout
  completes successfully.

hint: >
  Create the deployment with the rolling update strategy in the manifest, then use
  kubectl set image to update. Check rollout status with kubectl rollout status.
  The strategy fields go under spec.strategy.rollingUpdate.

validations:
  - name: deployment_exists
    type: resource_exists
    resource: deployment/webapp
    namespace: deploy-lab

  - name: replicas_count
    type: resource_field
    resource: deployment/webapp
    namespace: deploy-lab
    jsonpath: "{.spec.replicas}"
    expected: "4"

  - name: updated_image
    type: resource_field
    resource: deployment/webapp
    namespace: deploy-lab
    jsonpath: "{.spec.template.spec.containers[0].image}"
    expected: "nginx:1.21"

  - name: strategy_type
    type: resource_field
    resource: deployment/webapp
    namespace: deploy-lab
    jsonpath: "{.spec.strategy.type}"
    expected: "RollingUpdate"

solution:
  steps:
    - "kubectl create namespace deploy-lab --dry-run=client -o yaml | kubectl apply -f -"
    - |
      kubectl apply -f - <<EOF
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: webapp
        namespace: deploy-lab
      spec:
        replicas: 4
        selector:
          matchLabels:
            app: webapp
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 1
        template:
          metadata:
            labels:
              app: webapp
          spec:
            containers:
            - name: nginx
              image: nginx:1.19
      EOF
    - "kubectl set image deploy/webapp nginx=nginx:1.21 -n deploy-lab"
    - "kubectl rollout status deploy/webapp -n deploy-lab"
