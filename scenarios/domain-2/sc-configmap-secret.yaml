id: sc-configmap-secret
domain: 2
title: "Create a ConfigMap and Use It as an Environment Variable"
difficulty: easy
time_limit: 120
namespace: config-lab
description: >
  In the "config-lab" namespace, create a ConfigMap named "app-config" with a key
  "APP_ENV" set to "staging". Then create a Pod named "app" running "nginx:1.25"
  that reads APP_ENV from the ConfigMap as an environment variable.

hint: >
  Create the ConfigMap with kubectl create configmap, then reference it in the Pod
  spec using envFrom or env[].valueFrom.configMapKeyRef.

validations:
  - name: configmap_exists
    type: resource_exists
    resource: configmap/app-config
    namespace: config-lab

  - name: pod_exists
    type: resource_exists
    resource: pod/app
    namespace: config-lab

  - name: env_var_set
    type: container_env
    pod: app
    container: app
    namespace: config-lab
    env_var: APP_ENV
    expected: "staging"

solution:
  steps:
    - "kubectl create namespace config-lab --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create configmap app-config --from-literal=APP_ENV=staging -n config-lab"
    - |
      kubectl apply -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: app
        namespace: config-lab
      spec:
        containers:
          - name: app
            image: nginx:1.25
            env:
              - name: APP_ENV
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: APP_ENV
      EOF
