id: sc-rollout-pause-resume
domain: 2
title: "Pause and Resume a Deployment Rollout"
difficulty: medium
time_limit: 180
namespace: rollout-ns
description: >
  In the "rollout-ns" namespace, create a Deployment named "rolling-app" with 4
  replicas using image "nginx:1.20". Start an image update to "nginx:1.21" and
  immediately pause the rollout before it completes. Verify the rollout is paused
  and that two ReplicaSets coexist (old and new). Then resume the rollout and wait
  for all pods to be updated to nginx:1.21.

hint: >
  Run kubectl set image followed immediately by kubectl rollout pause. Check
  kubectl get replicasets to see both old and new RS during the pause. Use
  kubectl rollout resume to continue the update to completion.

validations:
  - name: deployment_exists
    type: resource_exists
    resource: deployment/rolling-app
    namespace: rollout-ns

  - name: replicas_count
    type: resource_field
    resource: deployment/rolling-app
    namespace: rollout-ns
    jsonpath: "{.spec.replicas}"
    expected: "4"

  - name: final_image
    type: resource_field
    resource: deployment/rolling-app
    namespace: rollout-ns
    jsonpath: "{.spec.template.spec.containers[0].image}"
    expected: "nginx:1.21"

  - name: pods_running
    type: label_selector
    resource_type: pod
    namespace: rollout-ns
    selector: "app=rolling-app"
    min_count: 4

solution:
  steps:
    - "kubectl create namespace rollout-ns --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create deploy rolling-app --image=nginx:1.20 --replicas=4 -n rollout-ns"
    - "kubectl rollout status deploy/rolling-app -n rollout-ns"
    - "kubectl set image deploy/rolling-app nginx=nginx:1.21 -n rollout-ns"
    - "kubectl rollout pause deploy/rolling-app -n rollout-ns"
    - "kubectl get rs -l app=rolling-app -n rollout-ns"
    - "kubectl rollout resume deploy/rolling-app -n rollout-ns"
    - "kubectl rollout status deploy/rolling-app -n rollout-ns"
