id: sc-security-context
domain: 4
title: "Configure Pod SecurityContext"
difficulty: medium
time_limit: 180
namespace: secure-app
description: >
  In the "secure-app" namespace, create a Pod named "secure-app" running "busybox:1.36"
  with command ["sleep", "3600"]. Configure the pod-level securityContext to run as
  user ID 1000 and group ID 3000. At the container level, set readOnlyRootFilesystem
  to true, allowPrivilegeEscalation to false, and drop ALL capabilities then add
  NET_BIND_SERVICE.

hint: >
  Use spec.securityContext for runAsUser/runAsGroup (pod-level). Use
  spec.containers[].securityContext for readOnlyRootFilesystem, allowPrivilegeEscalation,
  and capabilities (container-level).

validations:
  - name: pod_exists
    type: resource_exists
    resource: pod/secure-app
    namespace: secure-app

  - name: run_as_user
    type: resource_field
    resource: pod/secure-app
    namespace: secure-app
    jsonpath: "{.spec.securityContext.runAsUser}"
    expected: "1000"

  - name: readonly_rootfs
    type: resource_field
    resource: pod/secure-app
    namespace: secure-app
    jsonpath: "{.spec.containers[0].securityContext.readOnlyRootFilesystem}"
    expected: "true"

  - name: no_privilege_escalation
    type: resource_field
    resource: pod/secure-app
    namespace: secure-app
    jsonpath: "{.spec.containers[0].securityContext.allowPrivilegeEscalation}"
    expected: "false"

solution:
  steps:
    - "kubectl create namespace secure-app --dry-run=client -o yaml | kubectl apply -f -"
    - |
      kubectl apply -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: secure-app
        namespace: secure-app
      spec:
        securityContext:
          runAsUser: 1000
          runAsGroup: 3000
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
      EOF
