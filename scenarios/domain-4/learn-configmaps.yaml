id: learn-configmaps
domain: 4
title: "ConfigMaps: Create and Mount"
difficulty: easy
time_limit: 180
namespace: learn-config
learn_intro: >
  ConfigMaps separate configuration from container images — the same image can
  behave differently in dev, staging, and prod by pointing at different
  ConfigMaps. Three consumption methods: (1) envFrom with configMapRef injects
  all keys as environment variables at once; (2) env with valueFrom.configMapKeyRef
  picks specific keys; (3) volume mount makes each key a file in a directory.
  Critical difference: environment variables are set at container start and
  never update. Volume-mounted ConfigMaps update automatically (within ~1 minute)
  when the ConfigMap is modified. Create fast: kubectl create cm name
  --from-literal=KEY=value.
description: >
  Create a ConfigMap named "app-cfg" in the learn-config namespace with keys
  APP_ENV=staging and LOG_LEVEL=debug. Create a pod named "cfg-pod" using
  busybox (sleep 3600) that injects all ConfigMap keys as environment variables
  using envFrom. Verify by execing into the pod and checking env.
hint: >
  kubectl create cm app-cfg --from-literal=APP_ENV=staging
  --from-literal=LOG_LEVEL=debug -n learn-config. In the pod spec use
  spec.containers[].envFrom: [{configMapRef: {name: app-cfg}}]. After the pod
  is running: kubectl exec cfg-pod -n learn-config -- env | grep -E 'APP|LOG'.
validations:
  - name: configmap_exists
    type: resource_exists
    resource: configmap/app-cfg
    namespace: learn-config
  - name: pod_exists
    type: resource_exists
    resource: pod/cfg-pod
    namespace: learn-config
solution:
  steps:
    - "kubectl create ns learn-config --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create cm app-cfg --from-literal=APP_ENV=staging --from-literal=LOG_LEVEL=debug -n learn-config"
    - |
      kubectl apply -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: cfg-pod
        namespace: learn-config
      spec:
        containers:
        - name: app
          image: busybox
          command: ["sleep", "3600"]
          envFrom:
          - configMapRef:
              name: app-cfg
      EOF
    - "kubectl exec cfg-pod -n learn-config -- env | grep -E 'APP|LOG'"
