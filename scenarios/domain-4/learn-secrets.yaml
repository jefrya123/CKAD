id: learn-secrets
domain: 4
title: "Secrets: Create and Use"
difficulty: easy
time_limit: 180
namespace: learn-secrets
learn_intro: >
  Secrets work almost identically to ConfigMaps but are designed for sensitive
  data. Kubernetes base64-encodes Secret values — this is encoding not
  encryption; anyone who can read the Secret can decode it. Security comes from
  RBAC. Decode a stored value: kubectl get secret name -o
  jsonpath='{.data.key}' | base64 -d. The -n flag on echo is critical when
  encoding manually (echo -n 'value' | base64) — without it a newline gets
  encoded into the value. Volume-mounted Secrets are automatically decoded in
  the files. Always use readOnly: true when mounting secrets as volumes.
description: >
  Create a Secret named "db-creds" in the learn-secrets namespace with keys
  DB_USER=admin and DB_PASS=hunter2. Create a pod named "secret-pod" using
  busybox (sleep 3600) that mounts the entire secret as a read-only volume at
  /etc/db-creds. Verify by listing the files at that path and reading DB_PASS.
hint: >
  kubectl create secret generic db-creds --from-literal=DB_USER=admin
  --from-literal=DB_PASS=hunter2 -n learn-secrets. Mount with
  spec.volumes: [{name: creds, secret: {secretName: db-creds}}] and
  spec.containers[].volumeMounts: [{name: creds, mountPath: /etc/db-creds,
  readOnly: true}]. Check: kubectl exec secret-pod -n learn-secrets
  -- cat /etc/db-creds/DB_PASS.
validations:
  - name: secret_exists
    type: resource_exists
    resource: secret/db-creds
    namespace: learn-secrets
  - name: pod_exists
    type: resource_exists
    resource: pod/secret-pod
    namespace: learn-secrets
solution:
  steps:
    - "kubectl create ns learn-secrets --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create secret generic db-creds --from-literal=DB_USER=admin --from-literal=DB_PASS=hunter2 -n learn-secrets"
    - |
      kubectl apply -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: secret-pod
        namespace: learn-secrets
      spec:
        containers:
        - name: app
          image: busybox
          command: ["sleep", "3600"]
          volumeMounts:
          - name: creds
            mountPath: /etc/db-creds
            readOnly: true
        volumes:
        - name: creds
          secret:
            secretName: db-creds
      EOF
    - "kubectl exec secret-pod -n learn-secrets -- ls /etc/db-creds"
    - "kubectl exec secret-pod -n learn-secrets -- cat /etc/db-creds/DB_PASS"
    - "# Decode directly from API: kubectl get secret db-creds -n learn-secrets -o jsonpath='{.data.DB_PASS}' | base64 -d"
