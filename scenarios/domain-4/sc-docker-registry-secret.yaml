id: sc-docker-registry-secret
domain: 4
title: "Create a Docker Registry Secret and Use imagePullSecrets"
difficulty: medium
time_limit: 240
namespace: registry-ns
description: >
  In the "registry-ns" namespace, create a docker-registry Secret named "regcred" for
  server "registry.example.com" with username "docker-user", password "docker-pass",
  and email "user@example.com". Then create a Pod named "private-pod" using image
  "registry.example.com/myapp:latest" that references "regcred" as an imagePullSecret.
  The pod will likely fail to pull (registry doesn't exist), but the configuration
  must be correct.

hint: >
  Use "kubectl create secret docker-registry regcred --docker-server=... --docker-username=...
  --docker-password=... --docker-email=..." to create the secret. Reference it in the
  pod spec under spec.imagePullSecrets[].name.

validations:
  - name: secret_exists
    type: resource_exists
    resource: secret/regcred
    namespace: registry-ns

  - name: secret_type
    type: resource_field
    resource: secret/regcred
    namespace: registry-ns
    jsonpath: "{.type}"
    expected: "kubernetes.io/dockerconfigjson"

  - name: pod_exists
    type: resource_exists
    resource: pod/private-pod
    namespace: registry-ns

  - name: image_pull_secret
    type: resource_field
    resource: pod/private-pod
    namespace: registry-ns
    jsonpath: "{.spec.imagePullSecrets[0].name}"
    expected: "regcred"

solution:
  steps:
    - "kubectl create namespace registry-ns --dry-run=client -o yaml | kubectl apply -f -"
    - "kubectl create secret docker-registry regcred -n registry-ns --docker-server=registry.example.com --docker-username=docker-user --docker-password=docker-pass --docker-email=user@example.com"
    - |
      kubectl apply -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: private-pod
        namespace: registry-ns
      spec:
        containers:
          - name: app
            image: registry.example.com/myapp:latest
        imagePullSecrets:
          - name: regcred
      EOF
