id: debug-missing-secret
domain: 4
title: "Fix: Missing Secret Reference"
difficulty: medium
time_limit: 180
namespace: debug-lab07
description: >
  A pod named lab07-pod is stuck in Pending or error state. It references a Secret
  named db-password that does not exist in the namespace. Diagnose the issue and
  create the missing secret so the pod can start.

setup:
  manifest: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: lab07-pod
      namespace: debug-lab07
    spec:
      containers:
      - name: app
        image: busybox
        command: ["sleep", "3600"]
        env:
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-password
              key: password

hint: >
  Run kubectl describe pod lab07-pod -n debug-lab07 and look at the Events or
  Conditions sections. The pod cannot start because it is referencing a Secret
  that does not exist. Create the secret with kubectl create secret generic.

validations:
  - name: secret_exists
    type: resource_exists
    resource: secret/db-password
    namespace: debug-lab07
  - name: pod_running
    type: container_running
    pod: lab07-pod
    namespace: debug-lab07
    container: app

solution:
  steps:
    - "kubectl describe pod lab07-pod -n debug-lab07 | grep -A5 Events"
    - "kubectl get secrets -n debug-lab07"
    - "kubectl create secret generic db-password --from-literal=password=s3cret -n debug-lab07"
    - "kubectl get pod lab07-pod -n debug-lab07  # Pod should transition to Running"
