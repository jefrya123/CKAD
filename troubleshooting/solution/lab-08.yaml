# LAB 08 SOLUTION — Fixed: CronJob schedule uses 5 fields not 6
# Bug was: "*/2 * * * * *"  (6 fields — seconds field doesn't exist in standard cron)
# Fix:     "*/2 * * * *"    (5 fields: minute hour dom month dow)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lab08-cron
  namespace: default
spec:
  schedule: "*/2 * * * *"    # fixed: 5 fields
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: job
            image: busybox
            command: ["/bin/sh", "-c", "date; echo job ran"]
