# LAB 06 SOLUTION
# The broken image can't be fixed by editing alone if there's no history yet.
# In practice you'd have previous revisions to roll back to.
# Fix: correct the image directly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: q08-deploy
  namespace: neptune
spec:
  replicas: 2
  selector:
    matchLabels:
      app: q08-deploy
  template:
    metadata:
      labels:
        app: q08-deploy
    spec:
      containers:
      - name: nginx
        image: nginx:1.21    # fixed

# OR via rollback command:
# kubectl rollout undo deployment/q08-deploy -n neptune
# kubectl rollout history deployment/q08-deploy -n neptune > /tmp/lab06-history.txt
