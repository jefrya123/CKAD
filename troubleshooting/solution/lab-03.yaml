# LAB 03 SOLUTION — Fixed: volumeMount added to container
# Bug was: volume was defined but never mounted in the container
# Fix:     add volumeMounts referencing data-vol at /data
---
apiVersion: v1
kind: Pod
metadata:
  name: lab03-pod
  namespace: default
  labels:
    lab: "03"
spec:
  containers:
  - name: app
    image: busybox
    command: ["/bin/sh", "-c", "while true; do echo log >> /data/app.log; sleep 5; done"]
    volumeMounts:              # fixed: mount added
    - name: data-vol
      mountPath: /data
  volumes:
  - name: data-vol
    emptyDir: {}
