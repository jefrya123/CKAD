# LAB 05 SOLUTION — Fixed: pod template label matches selector
# Bug was: template label app: my-app, selector matchLabels app: myapp
# Fix:     make both "myapp"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab05-deploy
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp             # fixed: matches selector
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
