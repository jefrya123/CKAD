# LAB 02 SOLUTION — Fixed: service selector matches pod label
# Bug was: selector app: web-frontend
# Fix:     selector app: web-backend  (matches the pod's label)
---
apiVersion: v1
kind: Pod
metadata:
  name: lab02-pod
  namespace: default
  labels:
    app: web-backend
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: lab02-svc
  namespace: default
spec:
  selector:
    app: web-backend           # fixed
  ports:
  - port: 80
    targetPort: 80
