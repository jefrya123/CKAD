# LAB 10 SOLUTION — Fixed: initContainer now has volumeMount for /work
# Bug was: initContainer wrote to /work but had no volumeMount so path didn't exist
# Fix:     add volumeMount to initContainer pointing to same "workdir" volume
---
apiVersion: v1
kind: Pod
metadata:
  name: lab10-pod
  namespace: default
  labels:
    lab: "10"
spec:
  initContainers:
  - name: init-setup
    image: busybox
    command: ["/bin/sh", "-c", "echo ready > /work/ready"]
    volumeMounts:              # fixed: mount added to initContainer
    - name: workdir
      mountPath: /work
  containers:
  - name: main
    image: busybox
    command: ["/bin/sh", "-c", "cat /work/ready; sleep 3600"]
    volumeMounts:
    - name: workdir
      mountPath: /work
  volumes:
  - name: workdir
    emptyDir: {}
