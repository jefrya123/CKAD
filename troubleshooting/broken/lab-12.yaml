# LAB 12 — Mirrors Q17+Q18+Q20 combined (hardest): InitContainer + Service + NetworkPolicy
# THREE bugs across three resource types. Find and fix all of them.
# Symptom: Pod stuck in Init:CrashLoopBackOff, service has no endpoints, policy blocks wrong traffic
#
# SETUP:
#   kubectl create namespace moon 2>/dev/null || true
#   kubectl label namespace moon name=moon --overwrite
#   kubectl apply -f lab-12.yaml
#
# GOALS:
#   1. Pod q17-pod reaches Running (init must complete)
#   2. kubectl get endpoints q18-svc -n moon  shows an IP
#   3. NetworkPolicy allows ingress from namespace "moon" only
---
apiVersion: v1
kind: Pod
metadata:
  name: q17-pod
  namespace: moon
  labels:
    app: q17
spec:
  initContainers:
  - name: init
    image: busybox
    command: ["sh", "-c", "echo ready > /work/status.txt"]
    # BUG 1: no volumeMount here — /work doesn't exist, init crashes
  containers:
  - name: main
    image: nginx
    volumeMounts:
    - name: work
      mountPath: /work
  volumes:
  - name: work
    emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: q18-svc
  namespace: moon
spec:
  selector:
    app: q17-wrong          # BUG 2: should be "q17" to match pod label
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: q20-netpol
  namespace: moon
spec:
  podSelector:
    matchLabels:
      app: q17
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: venus       # BUG 3: should allow from "moon" namespace, not "venus"
