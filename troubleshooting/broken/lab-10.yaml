# LAB 10 — Broken: InitContainer fails, main container never starts
# Symptom: Pod stuck in Init:CrashLoopBackOff
# Your job: Find why the initContainer is failing and fix it
#
# SETUP: kubectl apply -f lab-10.yaml
# GOAL:  Pod reaches Running state, /work/ready file exists inside main container
---
apiVersion: v1
kind: Pod
metadata:
  name: lab10-pod
  namespace: default
  labels:
    lab: "10"
spec:
  initContainers:
  - name: init-setup
    image: busybox
    command: ["/bin/sh", "-c", "echo ready > /work/ready"]
    # <-- bug: no volumeMount here, so /work doesn't exist, command fails
  containers:
  - name: main
    image: busybox
    command: ["/bin/sh", "-c", "cat /work/ready; sleep 3600"]
    volumeMounts:
    - name: workdir
      mountPath: /work
  volumes:
  - name: workdir
    emptyDir: {}
