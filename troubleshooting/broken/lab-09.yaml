# LAB 09 — Broken: ConfigMap key name mismatch
# Symptom: Pod starts but env var APP_COLOR is empty
# Your job: Figure out why the env var isn't populated and fix it
#
# SETUP: kubectl apply -f lab-09.yaml
# GOAL:  kubectl exec lab09-pod -- env | grep APP_COLOR  shows APP_COLOR=blue
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab09-config
  namespace: default
data:
  color: blue              # key is "color"
---
apiVersion: v1
kind: Pod
metadata:
  name: lab09-pod
  namespace: default
  labels:
    lab: "09"
spec:
  containers:
  - name: app
    image: busybox
    command: ["/bin/sh", "-c", "echo APP_COLOR=$APP_COLOR; sleep 3600"]
    env:
    - name: APP_COLOR
      valueFrom:
        configMapKeyRef:
          name: lab09-config
          key: app-color     # <-- bug: key should be "color" not "app-color"
