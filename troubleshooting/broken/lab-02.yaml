# LAB 02 — Broken: Service selector doesn't match pod labels
# Symptom: Service has no Endpoints, curl to ClusterIP times out
# Your job: Find the mismatch and fix it
#
# SETUP: kubectl apply -f lab-02.yaml
# GOAL:  curl from inside the cluster hits the nginx pod
---
apiVersion: v1
kind: Pod
metadata:
  name: lab02-pod
  namespace: default
  labels:
    app: web-backend       # pod has THIS label
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: lab02-svc
  namespace: default
spec:
  selector:
    app: web-frontend      # <-- bug: doesn't match pod label
  ports:
  - port: 80
    targetPort: 80
